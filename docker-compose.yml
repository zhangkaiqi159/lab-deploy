# ============================================================
# 座舱自动化测试实验室 - 核心基础服务
# 包含：MySQL / Redis / MongoDB / InfluxDB / Elasticsearch
#       Kibana / MinIO / RabbitMQ / Jenkins / GitLab
#       Prometheus / Grafana / Allure / Nginx
#
# 用法：
#   cd /opt/lab-deploy
#   docker compose --env-file .env up -d
#
# 查看日志：
#   docker compose logs -f <服务名>
#
# 停止所有：
#   docker compose down
# ============================================================

name: testlab

networks:
  lab-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mysql_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/mysql" }
  redis_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/redis" }
  mongo_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/mongodb" }
  influx_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/influxdb" }
  es_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/elasticsearch" }
  minio_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/minio" }
  rabbitmq_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/rabbitmq" }
  gitlab_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/gitlab" }
  jenkins_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/jenkins" }
  prometheus_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/prometheus" }
  grafana_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/grafana" }
  allure_data:
    driver: local
    driver_opts: { type: none, o: bind, device: "${DATA_ROOT}/allure" }

services:

  # ══════════════════════════════════════════
  # 数据库层
  # ══════════════════════════════════════════

  mysql:
    image: mysql:8.0
    container_name: lab-mysql
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${MYSQL_PORT}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=1000
      - --innodb_buffer_pool_size=1G
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: lab-redis
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${REDIS_PORT}:6379"
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: lab-mongodb
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
      TZ: Asia/Shanghai
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: lab-influxdb
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${INFLUXDB_PORT}:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: "${INFLUXDB_ADMIN_USER}"
      DOCKER_INFLUXDB_INIT_PASSWORD: "${INFLUXDB_ADMIN_PASSWORD}"
      DOCKER_INFLUXDB_INIT_ORG: "${INFLUXDB_ORG}"
      DOCKER_INFLUXDB_INIT_BUCKET: "${INFLUXDB_BUCKET}"
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: "${INFLUXDB_ADMIN_TOKEN}"
      TZ: Asia/Shanghai
    volumes:
      - influx_data:/var/lib/influxdb2

  # ══════════════════════════════════════════
  # 搜索 / 日志
  # ══════════════════════════════════════════

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: lab-elasticsearch
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${ES_PORT}:9200"
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "${ES_JAVA_OPTS}"
      ELASTIC_PASSWORD: "${ES_PASSWORD}"
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      TZ: Asia/Shanghai
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 1000000, hard: 1000000 }
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -u elastic:${ES_PASSWORD} http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  kibana:
    image: kibana:8.12.0
    container_name: lab-kibana
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: "${ES_PASSWORD}"
      I18N_LOCALE: zh-CN
      TZ: Asia/Shanghai
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ══════════════════════════════════════════
  # 对象存储
  # ══════════════════════════════════════════

  minio:
    image: minio/minio:latest
    container_name: lab-minio
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD}"
      TZ: Asia/Shanghai
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ══════════════════════════════════════════
  # 消息队列
  # ══════════════════════════════════════════

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: lab-rabbitmq
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS}"
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ══════════════════════════════════════════
  # 代码管理
  # ══════════════════════════════════════════

  gitlab:
    image: gitlab/gitlab-ce:16.9.1-ce.0
    container_name: lab-gitlab
    restart: unless-stopped
    hostname: git.lab.internal
    networks: [lab-net]
    ports:
      - "${GITLAB_PORT_HTTP}:80"
      - "${GITLAB_PORT_SSH}:22"
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL}'
        gitlab_rails['gitlab_email_from'] = 'gitlab@lab.internal'
        gitlab_rails['initial_root_password'] = '${GITLAB_ROOT_PASSWORD}'
        gitlab_rails['time_zone'] = 'Asia/Shanghai'
        nginx['listen_port'] = 80
        prometheus['enable'] = false
        prometheus_monitoring['enable'] = false
    volumes:
      - ${DATA_ROOT}/gitlab/config:/etc/gitlab
      - ${DATA_ROOT}/gitlab/logs:/var/log/gitlab
      - ${DATA_ROOT}/gitlab/data:/var/opt/gitlab
    shm_size: 256m
    # GitLab 启动较慢，健康检查宽松
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:80/-/readiness"]
      interval: 30s
      timeout: 20s
      retries: 20
      start_period: 300s

  # ══════════════════════════════════════════
  # CI/CD
  # ══════════════════════════════════════════

  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: lab-jenkins
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${JENKINS_PORT}:8080"
      - "${JENKINS_AGENT_PORT}:50000"
    environment:
      JENKINS_OPTS: --prefix=/jenkins
      JAVA_OPTS: >-
        -Dfile.encoding=UTF-8
        -Duser.timezone=Asia/Shanghai
        -Djenkins.install.runSetupWizard=false
        -Dhudson.model.DirectoryBrowserSupport.CSP=
      TZ: Asia/Shanghai
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    user: root

  # ══════════════════════════════════════════
  # 监控体系
  # ══════════════════════════════════════════

  prometheus:
    image: prom/prometheus:latest
    container_name: lab-prometheus
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${PROMETHEUS_PORT}:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle

  grafana:
    image: grafana/grafana:latest
    container_name: lab-grafana
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SERVER_DOMAIN: monitor.lab.internal
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
      TZ: Asia/Shanghai
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on: [prometheus]

  node-exporter:
    image: prom/node-exporter:latest
    container_name: lab-node-exporter
    restart: unless-stopped
    networks: [lab-net]
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.ignored-mount-points="^/(sys|proc|dev|host|etc)($$|/)"
    expose:
      - "9100"

  cadvisor:
    # 原 gcr.io/cadvisor/cadvisor 在国内被墙，改用 Docker Hub 镜像
    image: zcube/cadvisor:latest
    container_name: lab-cadvisor
    restart: unless-stopped
    networks: [lab-net]
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - "8080"

  # ══════════════════════════════════════════
  # 测试报告
  # ══════════════════════════════════════════

  allure:
    image: frankescobar/allure-docker-service:latest
    container_name: lab-allure
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${ALLURE_PORT}:5050"
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 3
      KEEP_HISTORY: "true"
      KEEP_HISTORY_LATEST: 20
      TZ: Asia/Shanghai
    volumes:
      - ${DATA_ROOT}/allure/results:/app/allure-results
      - ${DATA_ROOT}/allure/reports:/app/default-reports

  allure-ui:
    image: frankescobar/allure-docker-service-ui:latest
    container_name: lab-allure-ui
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "5252:5252"
    environment:
      ALLURE_DOCKER_PUBLIC_API_URL: http://allure.lab.internal
    depends_on: [allure]

  # ══════════════════════════════════════════
  # 反向代理 / 统一入口
  # ══════════════════════════════════════════

  nginx:
    image: nginx:alpine
    container_name: lab-nginx
    restart: unless-stopped
    networks: [lab-net]
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/conf.d:/etc/nginx/conf.d:ro
      - ${DATA_ROOT}/nginx/ssl:/etc/nginx/ssl:ro
      - ${DATA_ROOT}/nginx/logs:/var/log/nginx
      - ${DATA_ROOT}/nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - gitlab
      - jenkins
      - grafana
      - allure
      - minio
      - kibana

# ============================================================
# 实验室各服务反向代理配置
# 访问方式：在客户端 /etc/hosts 或内网 DNS 配置以下条目
#   192.168.1.100  git.lab.internal
#   192.168.1.100  ci.lab.internal
#   192.168.1.100  monitor.lab.internal
#   192.168.1.100  log.lab.internal
#   192.168.1.100  minio.lab.internal
#   192.168.1.100  allure.lab.internal
#   192.168.1.100  llm.lab.internal
# ============================================================

# ── GitLab ────────────────────────────────────────────────
server {
    listen 80;
    server_name git.lab.internal;
    location / {
        proxy_pass         http://lab-gitlab:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        client_max_body_size 500m;
    }
}

# ── Jenkins ───────────────────────────────────────────────
server {
    listen 80;
    server_name ci.lab.internal;
    location / {
        proxy_pass         http://lab-jenkins:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

# ── Grafana ───────────────────────────────────────────────
server {
    listen 80;
    server_name monitor.lab.internal;
    location / {
        proxy_pass         http://lab-grafana:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}


# ============================================================
# LiteLLM 路由配置 - 统一模型 API 网关
# 所有请求通过 http://lab-litellm:4000/v1 访问（OpenAI 兼容）
# ============================================================
model_list:

  # 本地 Ollama 模型（自动拉取，需先运行 ollama pull）
  - model_name: deepseek-coder        # 对外暴露的模型别名
    litellm_params:
      model: ollama/deepseek-coder:6.7b
      api_base: http://lab-ollama:11434

  - model_name: qwen2.5-7b
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://lab-ollama:11434

  - model_name: nomic-embed-text      # Embedding 模型（RAG 向量化用）
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://lab-ollama:11434

  # 若需接入 DeepSeek 在线 API（注释掉或按需开启）
  # - model_name: deepseek-online
  #   litellm_params:
  #     model: deepseek/deepseek-chat
  #     api_key: "os.environ/DEEPSEEK_API_KEY"  # 用环境变量

litellm_settings:
  drop_params: true
  set_verbose: false

general_settings:
  master_key: "Lab-LiteLLM-MasterKey-2025!"

# ============================================================
# Prometheus 采集配置
# ============================================================
global:
  scrape_interval:     15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['lab-node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['lab-cadvisor:8080']

  - job_name: 'mysql'
    static_configs:
      - targets: ['lab-mysql-exporter:9104']

  - job_name: 'redis'
    static_configs:
      - targets: ['lab-redis-exporter:9121']

  - job_name: 'elasticsearch'
    static_configs:
      - targets: ['lab-es-exporter:9114']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['lab-rabbitmq:15692']

  - job_name: 'jenkins'
    metrics_path: /jenkins/prometheus
    static_configs:
      - targets: ['lab-jenkins:8080']

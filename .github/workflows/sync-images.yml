# ============================================================
# 自动将 Docker Hub 镜像同步到阿里云 ACR
# 触发方式：
#   1. 手动触发（Actions 页面点 Run workflow）
#   2. 修改 .github/image-list.txt 后 push
#   3. 每周日凌晨 2 点自动刷新 latest 标签
#
# 所需 GitHub Secrets（在仓库 Settings -> Secrets 里添加）：
#   ACR_REGISTRY  : registry.cn-hangzhou.aliyuncs.com
#   ACR_NAMESPACE : 你的 ACR 命名空间（如 mylab2025）
#   ACR_USERNAME  : 阿里云账号（邮箱或子账号）
#   ACR_PASSWORD  : ACR 登录密码
# ============================================================

name: Sync Docker Images to ACR

on:
  push:
    paths:
      - '.github/image-list.txt'
      - '.github/workflows/sync-images.yml'
  workflow_dispatch:
    inputs:
      image:
        description: '单独同步某个镜像（留空则同步全部，例如：mysql:8.0）'
        required: false
        default: ''
      force:
        description: '强制重新同步（即使 ACR 已存在）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
  schedule:
    # 每周日 UTC 18:00 = 北京时间周一 02:00，刷新 latest 标签
    - cron: '0 18 * * 0'

env:
  ACR_REGISTRY: ${{ secrets.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ secrets.ACR_NAMESPACE }}

jobs:
  sync:
    name: Sync Images
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 最长 6 小时（GitLab 等大镜像需要时间）

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Aliyun ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sync images
        env:
          FORCE: ${{ github.event.inputs.force || 'false' }}
          SINGLE_IMAGE: ${{ github.event.inputs.image || '' }}
        run: |
          set -e

          GREEN='\033[0;32m'; YELLOW='\033[1;33m'; RED='\033[0;31m'; CYAN='\033[0;36m'; NC='\033[0m'
          info()    { echo -e "${GREEN}✓${NC} $*"; }
          warn()    { echo -e "${YELLOW}!${NC} $*"; }
          fail()    { echo -e "${RED}✗${NC} $*"; }
          section() { echo -e "\n${CYAN}── $* ──${NC}"; }

          FAILED=()
          SKIPPED=()
          SUCCESS=()

          sync_image() {
            local src="$1"   # 原始镜像，如 mysql:8.0

            # 将镜像名转换为 ACR 路径
            # ACR 个人版仓库名只支持字母/数字/中划线/下划线，不支持斜杠
            # 转换规则：取最后一段镜像名，org 前缀拼到 tag 前
            # mysql:8.0               -> ACR_NAMESPACE/mysql:8.0
            # minio/minio:latest      -> ACR_NAMESPACE/minio:minio-latest
            # gitlab/gitlab-ce:16.9.1 -> ACR_NAMESPACE/gitlab-ce:gitlab-16.9.1
            # prom/node-exporter:latest -> ACR_NAMESPACE/node-exporter:prom-latest
            local name_part="${src%%:*}"   # mysql  或  minio/minio
            local tag_part="${src##*:}"    # 8.0    或  latest

            if [[ "$name_part" == */* ]]; then
              local org="${name_part%%/*}"     # minio
              local repo="${name_part##*/}"    # minio
              # ACR 仓库名用 repo，tag 前加 org- 前缀区分来源
              local acr_repo="${repo}"
              local acr_tag="${org}-${tag_part}"
            else
              local acr_repo="${name_part}"
              local acr_tag="${tag_part}"
            fi
            local acr_target="${ACR_REGISTRY}/${ACR_NAMESPACE}/${acr_repo}:${acr_tag}"

            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  源：$src"
            echo "  目标：$acr_target"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            # 检查 ACR 是否已存在（非强制模式下跳过）
            if [ "$FORCE" != "true" ]; then
              if docker manifest inspect "$acr_target" > /dev/null 2>&1; then
                warn "ACR 已存在，跳过（强制同步请使用 force=true）"
                SKIPPED+=("$src")
                return 0
              fi
            fi

            # 拉取源镜像
            echo "  正在拉取..."
            if ! docker pull "$src"; then
              fail "拉取失败：$src"
              FAILED+=("$src")
              return 1
            fi

            # 打 tag 并推送到 ACR
            docker tag "$src" "$acr_target"
            echo "  正在推送到 ACR..."
            if docker push "$acr_target"; then
              info "同步完成：$acr_target"
              SUCCESS+=("$src")
              # 推送成功后删除本地镜像释放空间
              docker rmi "$src" "$acr_target" > /dev/null 2>&1 || true
            else
              fail "推送失败：$acr_target"
              FAILED+=("$src")
              return 1
            fi
          }

          # ── 读取镜像清单 ──────────────────────────────
          if [ -n "$SINGLE_IMAGE" ]; then
            # 手动触发指定单个镜像
            section "单独同步：$SINGLE_IMAGE"
            sync_image "$SINGLE_IMAGE"
          else
            # 读取 image-list.txt，过滤注释和空行
            section "批量同步全部镜像"
            while IFS= read -r line || [ -n "$line" ]; do
              # 去掉注释和空行
              line="$(echo "$line" | sed 's/#.*//' | xargs)"
              [ -z "$line" ] && continue
              sync_image "$line"
            done < ".github/image-list.txt"
          fi

          # ── 汇总报告 ─────────────────────────────────
          echo ""
          echo "╔══════════════════════════════════════════╗"
          echo "║              同步结果汇总                 ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  成功: ${#SUCCESS[@]} 个"
          echo "║  跳过: ${#SKIPPED[@]} 个（ACR已存在）"
          echo "║  失败: ${#FAILED[@]} 个"
          echo "╚══════════════════════════════════════════╝"

          if [ ${#SUCCESS[@]} -gt 0 ]; then
            info "成功同步的镜像："
            for img in "${SUCCESS[@]}"; do echo "    $img"; done
          fi

          if [ ${#SKIPPED[@]} -gt 0 ]; then
            warn "已跳过（ACR 中已存在）："
            for img in "${SKIPPED[@]}"; do echo "    $img"; done
          fi

          if [ ${#FAILED[@]} -gt 0 ]; then
            fail "以下镜像同步失败："
            for img in "${FAILED[@]}"; do echo "    $img"; done
            exit 1
          fi

      - name: Print ACR pull commands
        if: success()
        run: |
          echo ""
          echo "════════════════════════════════════════════"
          echo "在实验室服务器上，用以下命令拉取镜像："
          echo ""
          echo "  # 1. 登录 ACR"
          echo "  docker login ${{ secrets.ACR_REGISTRY }} \\"
          echo "    -u ${{ secrets.ACR_USERNAME }} \\"
          echo "    -p <你的ACR密码>"
          echo ""
          echo "  # 2. 运行拉取脚本（ACR模式）"
          echo "  sudo bash pull_all_images.sh acr"
          echo "════════════════════════════════════════════"
